        - docs/34-WebSocket协议.md#5-音视频通话信令
      ui_rules:
        - docs/20-UI交互规范总纲.md#通话界面
      ui_detail:
        - docs/49-通话界面UI设计规范.md
      gap:
        - docs/04-待确认问题.md#Q-001
      quality:
        - docs/52-测试与质量策略.md
    scope_in:
      - ruoyi-im-web/src/composables/useWebRTC.js
      - ruoyi-im-web/src/views/CallDialog.vue
      - ruoyi-im-api/src/main/java/com/ruoyi/im/controller/ImVideoCallController.java
    scope_out:
      - ruoyi-im-web/src/views/admin/
    preconditions:
      - WebRTC 信令服务器已就绪
      - 后端 ImVideoCallController 接口已实现
    dependencies:
      - WebSocket 长连接
    route_or_entry:
      - 聊天窗口头部通话按钮
    api_contract:
      - GET /api/im/call/turn-server (获取中转服务器)
      - POST /api/im/call/signal (发送信令)
    ui_tokens:
      - 必须遵循 design-tokens.scss 中的状态色 (success/error)
    anti_conflict_scan: true
    state_changes:
      - 用户的通话忙闲状态 (user_status)
      - 会话中的通话活动状态
    doc_writeback:
      required:
        - docs/03-实现状态矩阵.md#1-6-通话功能
        - docs/04-待确认问题.md#Q-001
    acceptance:
      - AC1: 成功发起通话，接收方弹出呼叫界面并伴有提示音
      - AC2: 接听后双端媒体流建立成功，时延 < 500ms
      - AC3: 模拟 3s 内断线可自动重连，超过 3s 提示重拨
    manual_test_steps:
      - Step1: 用户A点击通话，观察用户B是否弹出 Dialog
      - Step2: 用户B点击接听，检查摄像头和麦克风权限及画面
      - Step3: 断开网络 2s 后恢复，观察是否自动重连
    verify_cmd:
      - npm run build
    risk: high
    rollback:
      - 回退到 CallDialog 的稳定版本并标记为“联调失败”

